"A connection to a list of `MarketplaceListingSpvProposal` values."
type MarketplaceListingSpvProposalsConnection {
  "A list of `MarketplaceListingSpvProposal` objects."
  nodes: [MarketplaceListingSpvProposal]!
  "A list of edges which contains the `MarketplaceListingSpvProposal` and cursor to aid in pagination."
  edges: [MarketplaceListingSpvProposalsEdge!]!
  "Information to aid in pagination."
  pageInfo: PageInfo!
  "The count of *all* `MarketplaceListingSpvProposal` you could get from the connection."
  totalCount: Int!
  "Aggregates across the matching connection (ignoring before/after/first/last/offset)"
  aggregates: MarketplaceListingSpvProposalAggregates
  "Grouped aggregates across the matching connection (ignoring before/after/first/last/offset)"
  groupedAggregates(
    "The method to use when grouping `MarketplaceListingSpvProposal` for these aggregates."
    groupBy: [MarketplaceListingSpvProposalsGroupBy!]!
    "Conditions on the grouped aggregates."
    having: MarketplaceListingSpvProposalsHavingInput
  ): [MarketplaceListingSpvProposalAggregates!]
}

type MarketplaceListingSpvProposal implements Node {
  "A globally unique identifier. Can be used in various places throughout the system to identify this single value."
  nodeId: ID!
  id: String!
  listingId: Int!
  ongoingObjectListingId: String
  proposalId: String
  updatedBlock: Int!
  "Reads a single `MarketplaceOngoingObjectListing` that is related to this `MarketplaceListingSpvProposal`."
  ongoingObjectListing: MarketplaceOngoingObjectListing
}

type MarketplaceOngoingObjectListing implements Node {
  "A globally unique identifier. Can be used in various places throughout the system to identify this single value."
  nodeId: ID!
  id: String!
  listingId: Int!
  assetId: Int
  realWorldAssetId: String
  collectionId: Int
  itemId: Int
  realEstateNftId: String
  realEstateDeveloper: String
  sharePrice: String
  shareAmount: Int
