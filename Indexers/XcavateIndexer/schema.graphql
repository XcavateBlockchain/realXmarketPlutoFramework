  tax: Int
  listingExpiry: Int
  claimExpiry: Int
  relistCount: Int
  unclaimedShareAmount: Int
  collectedFunds: String
  collectedTax: String
  collectedFees: String
  investorFunds: String
  updatedBlock: Int!
  "Reads a single `RealWorldAsset` that is related to this `MarketplaceOngoingObjectListing`."
  realWorldAsset: RealWorldAsset
  "Reads a single `RealEstateNft` that is related to this `MarketplaceOngoingObjectListing`."
  realEstateNft: RealEstateNft
  "Reads and enables pagination through a set of `MarketplaceListingSpvProposal`."
  listingSpvProposals(
    "Only read the first `n` values of the set."
