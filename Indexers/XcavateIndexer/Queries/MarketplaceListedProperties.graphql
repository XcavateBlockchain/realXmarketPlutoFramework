query MarketplaceListedProperties(
  $first: Int = 10
  $offset: Int = 0
  $includesTownCity: String = ""
  $includesPropertyType: String = ""
  $includesPropertyName: String = ""
) {
  marketplaceOngoingObjectListings(
    first: $first
    offset: $offset
    filter: {
      realEstateNft: {townCity: {includesInsensitive: $includesTownCity}}
      and: {
        realEstateNft: {
          propertyType: {includesInsensitive: $includesPropertyType}
        }
        and: {
          realEstateNft: {
            propertyName: {includesInsensitive: $includesPropertyName}
          }
        }
      }
    }
  ) {
    nodes {
      assetId
      claimExpiry
      collectedFees
      collectedFunds
      collectedTax
      collectionId
      id
      investorFunds
      itemId
      listedShareAmount
      listingExpiry
      listingId
      realEstateDeveloper
      realEstateNftId
      realWorldAssetId
      relistCount
      tax
      taxPaidByDeveloper
      shareAmount
      sharePrice
      unclaimedShareAmount
      updatedBlock
      realEstateNft {
        accountAddress
        annualServiceCharge
        area
        buildingControlCode
        collection
        companyLogo
        companyName
        constructionDate
        createdAt
        developerAddress
        estimatedRentalIncome
        files
        flatOrUnit
        id
        isAnnualServiceChargePaid
        isStampDutyPaid
        item
        legalRepresentative
        localAuthority
        map
        numberOfBathrooms
        numberOfBedrooms
        numberOfShares
        offStreetParking
        outdoorSpace
        planningCode
        postCode
        propertyDescription
        propertyId
        pricePerShare
        propertyName
        propertyPrice
        propertyType
        quality
        stampDutyTax
        status
        street
        townCity
        updatedAt
      }
    }
  }
}
