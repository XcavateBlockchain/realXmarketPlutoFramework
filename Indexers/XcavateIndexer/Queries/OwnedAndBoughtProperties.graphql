query OwnedAndBoughtProperties(
  $first: Int = 10
  $offset: Int = 0
  $tokenOwner: String = "14XAmaujtAthi7KdWsJrKh1QEjiNXwabW1YdYUCbAM6TeGk"
) {
  realEstateNfts(
    offset: $offset
    first: $first
    filter: {
      marketplaceOngoingObjectListings: {
        some: {tokenOwners: {some: {account: {equalTo: $tokenOwner}}}}
      }
    }
  ) {
    nodes {
      propertyType
      propertyPrice
      quality
      propertyName
      propertyId
      pricePerToken
      propertyDescription
      postCode
      planningCode
      outdoorSpace
      accountAddress
      annualServiceCharge
      area
      buildingControlCode
      collection
      companyLogo
      companyName
      constructionDate
      createdAt
      developerAddress
      estimatedRentalIncome
      files
      flatOrUnit
      id
      isStampDutyPaid
      isAnnualServiceChargePaid
      item
      legalRepresentative
      localAuthority
      map
      numberOfBedrooms
      numberOfBathrooms
      numberOfTokens
      offStreetParking
      stampDutyTax
      status
      street
      townCity
      updatedAt
      marketplaceOngoingObjectListings(first: 1) {
        nodes {
          updatedBlock
          unclaimedTokenAmount
          tokenPrice
          tokenAmount
          taxPaidByDeveloper
          relistCount
          tax
          realWorldAssetId
          realEstateNftId
          realEstateDeveloper
          listingId
          listingExpiry
          listedTokenAmount
          itemId
          investorFunds
          id
          collectedTax
          collectionId
          collectedFunds
          collectedFees
          claimExpiry
          assetId
          tokenOwners(first: 1, filter: {account: {equalTo: $tokenOwner}}) {
            nodes {
              id
              account
              tokenAmount
              updatedBlock
              relistCount
              paidTax
              paidFunds
              ongoingObjectListingId
              listingId
            }
          }
        }
      }
      realWorldAssets(first: 1) {
        nodes {
          collectionId
          assetId
          finalized
          id
          itemId
          location
          ownerAccounts
          price
          realEstateNftId
          region
          spvCreated
          tokenAmount
          updatedBlock
          owners(first: 1, filter: {account: {equalTo: $tokenOwner}}) {
            nodes {
              account
              assetId
              id
              tokenAmount
              assetIdNumber
              updatedBlock
            }
          }
        }
      }
    }
  }
}
